name: conformance
on:
  pull_request:
  pull_request_target:
    types: [labeled]

permissions: read-all

jobs:
  conformance:
    if: "${{ github.event.action != 'labeled' || github.event.label.name == 'tests: run' }}"
    name: conformance
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: 'read'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: Remove PR Label
        if: "${{ github.event.action == 'labeled' && github.event.label.name == 'tests: run' }}"
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.issues.removeLabel({
                name: 'tests: run',
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number
              });
            } catch (e) {
              console.log('Failed to remove label. Another job may have already removed it!');
            }
            
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'
          
      - name: Start MCP Toolbox Server
        run: |
          go build -o toolbox
          ./toolbox --allowed-hosts localhost --config tests/conformance/tools.yaml &
          sleep 5 # Give the server a moment to bind to port 5000

      - name: Run Conformance Tests
        uses: modelcontextprotocol/conformance@21a9a2febd7100d7c17ac1021ee7f2ed9f66a1e0 # v0.1.16
        with:
          mode: server
          url: 'http://localhost:5000/mcp'
          suite: active
          expected-failures: tests/conformance/conformance-baseline.yml
